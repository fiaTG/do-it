; Nidula-Produktion (ADR-0025)
expose_php = 0
memory_limit = 512M

; Galerie-Uploads: Fotos bis 25 MB (Backend validiert zusätzlich)
upload_max_filesize = 25M
post_max_size = 30M

; OPcache: Code ist im Image eingebacken -> keine Timestamp-Prüfung nötig,
; ein neues Deploy bringt ohnehin einen neuen Container.
opcache.enable = 1
opcache.validate_timestamps = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000
