; Dev-Performance auf Windows/Docker:
; Sail bedient die App über `artisan serve` (PHP-Builtin-Server = CLI-SAPI).
; Standardmäßig ist OPcache für CLI aus -> jeder Request kompiliert das
; Framework neu und liest hunderte Dateien über den langsamen Bind-Mount.
; Diese Einstellungen aktivieren OPcache auch für den Builtin-Server.
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=256
opcache.max_accelerated_files=20000
; 0 = kein stat() pro Request -> serviert komplett aus dem Speicher (schnell).
; Preis: Backend-Code-Änderungen erst nach `docker compose restart laravel.test`
; (bzw. opcache_reset) sichtbar. Für Dev auf Windows der beste Kompromiss.
opcache.validate_timestamps=0
